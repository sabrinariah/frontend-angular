```
<!-- HEADER -->
<div class="edit-header">
  <h2>Modifier le processus</h2>
  <p>Mettre à jour les informations du processus</p>
</div>

<form [formGroup]="form" (ngSubmit)="saveChanges()">

  <div class="form-grid">

    <!-- NOM -->
    <div class="form-group">
      <label>Nom du processus</label>
      <input type="text" formControlName="nom" />
      <div *ngIf="form.get('nom')?.invalid && form.get('nom')?.touched" class="error">
        Champ obligatoire
      </div>
    </div>

    <!-- TYPE -->
    <div class="form-group">
      <label>Type</label>
      <input type="text" formControlName="typeProcessus" />
      <div *ngIf="form.get('typeProcessus')?.invalid && form.get('typeProcessus')?.touched" class="error">
        Champ obligatoire
      </div>
    </div>

    <!-- DATE DEBUT -->
    <div class="form-group">
      <label>Date début</label>
      <input type="date" formControlName="dateDebut" />
    </div>

    <!-- DATE FIN -->
    <div class="form-group">
      <label>Date fin</label>
      <input type="date" formControlName="dateFin" />
    </div>

  </div>

  <!-- SWITCH ACTIF -->
  <div class="switch-group">
    <label>Statut</label>

    <label class="switch">
      <input type="checkbox" formControlName="actif">
      <span class="slider"></span>
    </label>

    <span class="status-text">
      {{ form.get('actif')?.value ? 'Actif' : 'Inactif' }}
    </span>
  </div>

  <!-- ACTIONS -->
  <div class="form-actions">

    <button type="button" class="btn-cancel"
            (click)="router.navigate(['/processus'])">
      Annuler
    </button>

    <button type="submit" class="btn-save" [disabled]="form.invalid">
      Enregistrer
    </button>

  </div>

</form>
