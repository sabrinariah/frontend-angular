<div class="auth-container">
  <div class="auth-card">

    <!-- LOGO -->
    <div class="auth-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="white"
           stroke-width="2" stroke-linecap="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>

    <h2>Créer un compte</h2>
    <p class="auth-subtitle">Rejoignez la plateforme de gestion des processus</p>

    <!-- ALERTS -->
    <div *ngIf="success" class="alert alert-success">
      <span class="alert-icon">&#10003;</span> {{ success }}
    </div>
    <div *ngIf="error" class="alert alert-error">
      <span class="alert-icon">&#9888;</span> {{ error }}
    </div>

    <form (ngSubmit)="register()" #registerForm="ngForm">

      <!-- Prénom + Nom -->
      <div class="form-row">
        <div class="form-group">
          <label>Prénom</label>
          <div class="input-wrap">
            <span class="input-icon">&#128100;</span>
            <input type="text" name="firstName"
                   [(ngModel)]="firstName"
                   required placeholder="Votre prénom">
          </div>
        </div>
        <div class="form-group">
          <label>Nom</label>
          <div class="input-wrap">
            <span class="input-icon">&#128100;</span>
            <input type="text" name="lastName"
                   [(ngModel)]="lastName"
                   required placeholder="Votre nom">
          </div>
        </div>
      </div>

      <!-- EMAIL -->
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <span class="input-icon">&#64;</span>
          <input type="email" name="email"
                 [(ngModel)]="email"
                 required placeholder="exemple@mail.com">
        </div>
      </div>

      <!-- ROLE -->
      <div class="form-group">
        <label>Rôle</label>
        <div class="input-wrap">
          <span class="input-icon">&#127775;</span>
          <select name="role" [(ngModel)]="selectedRole">
            <option *ngFor="let role of availableRoles" [value]="role.value">
              {{ role.label }}
            </option>
          </select>
        </div>
      </div>

      <!-- PASSWORD -->
      <div class="form-group">
        <label>Mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon">&#128274;</span>
          <input type="password" name="password"
                 [(ngModel)]="password"
                 required minlength="6"
                 placeholder="Minimum 6 caractères">
        </div>
        <!-- Barre de force -->
        <div class="strength-bar">
          <div class="strength-fill"
               [style.width]="getStrengthPercent()"
               [style.background]="getStrengthColor()">
          </div>
        </div>
        <small class="hint" [style.color]="getStrengthColor()">
          {{ getStrengthLabel() }}
        </small>
      </div>

      <!-- CONFIRM PASSWORD -->
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <div class="input-wrap">
          <span class="input-icon">&#128274;</span>
          <input type="password" name="confirmPassword"
                 [(ngModel)]="confirmPassword"
                 required placeholder="Confirmez le mot de passe">
        </div>
        <small *ngIf="confirmPassword && !passwordsMatch()" class="match-error">
          Les mots de passe ne correspondent pas
        </small>
        <small *ngIf="confirmPassword && passwordsMatch()" class="match-ok">
          &#10003; Les mots de passe correspondent
        </small>
      </div>

      <!-- SUBMIT -->
      <button type="submit" class="btn-submit"
              [disabled]="!isFormValid() || loading">
        <span *ngIf="!loading">Créer mon compte</span>
        <span *ngIf="loading" class="loading-spinner">Création...</span>
      </button>

    </form>

    <div class="auth-divider">
      <hr><span>ou</span><hr>
    </div>

    <div class="auth-footer">
      Déjà un compte ?
      <a routerLink="/login">Se connecter</a>
    </div>

  </div>
</div>
