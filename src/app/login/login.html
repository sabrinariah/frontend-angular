<div class="login-container">

  <!-- Left side: Formulaire -->
  <div class="left-side">
    <div class="form-wrapper">
      <h1 class="welcome-text">Bienvenue</h1>
      <p class="subtitle">Connectez-vous pour continuer</p>

      <form (ngSubmit)="login()" class="login-form">

        <!-- Username -->
        <div class="input-group">
          <label for="username">Nom d'utilisateur</label>
          <div class="input-box">
            <span class="icon">👤</span>
            <input 
              type="text" 
              id="username"
              [(ngModel)]="username" 
              name="username" 
              placeholder="ahlem"
              required>
          </div>
        </div>

        <!-- Password -->
        <div class="input-group">
          <label for="password">Mot de passe</label>
          <div class="input-box">
            <span class="icon">🔒</span>
            <input 
              type="password" 
              id="password"
              [(ngModel)]="password" 
              name="password" 
              placeholder="••••••••"
              required>
          </div>
        </div>

       

        <button type="submit" class="login-btn">Se connecter</button>

        <!-- Social login -->
        <div class="social-login">
          <p class="or">Ou se connecter avec</p>
          
        </div>
      </form>
    </div>
  </div>

  <!-- Right side: Illustration -->
  <div class="right-side">
    <div class="background"></div>
    <!-- Tu peux mettre ici une illustration plus grande ou garder l'image de fond -->
  </div>
</div>
